name: SSH Smoke Test
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets presence
        run: |
          [ -n "${{ secrets.DEPLOY_HOST }}" ] && echo DEPLOY_HOST=OK || (echo DEPLOY_HOST=EMPTY; exit 1)
          [ -n "${{ secrets.DEPLOY_USER }}" ] && echo DEPLOY_USER=OK || (echo DEPLOY_USER=EMPTY; exit 1)
          [ -n "${{ secrets.DEPLOY_KEY }}" ]  && echo DEPLOY_KEY=OK  || (echo DEPLOY_KEY=EMPTY;  exit 1)
      - name: Connect over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          # passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}   # si tu en as mis une
          script: |
            hostname
            uptime
