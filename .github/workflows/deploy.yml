name: Deploy to OVH (PM2)

on:
  push:
    branches: [ "main" ]      # déploie à chaque push sur main
  workflow_dispatch: {}        # déclenchement manuel possible

concurrency: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1) Charge ta clé privée depuis les Secrets (multiligne BEGIN/END)
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          # si ta clé a une passphrase, décommente:
          # ssh-passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}

      # 2) Ajoute l’hôte à known_hosts (évite le prompt d’empreinte)
      - name: Trust host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # 3) Déploiement sur le VPS
      - name: Deploy over SSH
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # déjà présent chez toi
        run: |
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<EOF
          set -e
          cd /var/www/ai-studio-app/lolirine-pool-store-8

          # Récupérer la dernière version
          git fetch origin
          git reset --hard origin/main

          # (Option) Écrire/mettre à jour le .env sur le serveur
          # -> Si tu préfères gérer le .env manuellement, supprime ce bloc.
          cat > .env <<EOT
          NODE_ENV=production
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOT

          # Dépendances + build
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

          # (Re)démarrer l'app avec PM2 (serve dist sur port 3000)
          if pm2 describe lolirinepoolstore > /dev/null; then
            pm2 restart lolirinepoolstore
          else
            pm2 serve dist 3000 --spa --name lolirinepoolstore
          fi
          pm2 save
          EOF
