name: Deploy to OVH (PM2)

on:
  push:
    branches: [ "main" ]   # déploie à chaque push sur main
  workflow_dispatch: {}     # déclenchement manuel possible

concurrency: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          # ssh-passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}  # seulement si ta clé en a une

      - name: Trust host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<'EOF'
          set -e
          cd /var/www/ai-studio-app/lolirine-pool-store-8
          git fetch origin
          git reset --hard origin/main
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
          if pm2 describe lolirinepoolstore > /dev/null; then
            pm2 restart lolirinepoolstore
          else
            pm2 serve dist 3000 --spa --name lolirinepoolstore
          fi
          pm2 save
          EOF
