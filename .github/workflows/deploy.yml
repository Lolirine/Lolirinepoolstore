name: Deploy to OVH (PM2)
on:
  push:
    branches: [ "main" ]      # déploie à chaque push sur main
  workflow_dispatch: {}        # déclenchement manuel possible

concurrency: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1) Charge ta clé privée depuis les Secrets (multiligne BEGIN/END)
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          # si ta clé a une passphrase, décommente:
          # ssh-passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}

      # 2) Ajoute l’hôte à known_hosts (évite le prompt d’empreinte)
      - name: Trust host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # 3) Déploiement sur le VPS
      - name: Deploy over SSH
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # déjà présent chez toi
        run: |
      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=yes \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'; bash -s" <<'EOF'
          set -euo pipefail

          # --- PERSISTENCE UPLOADS ---
          sudo mkdir -p /srv/lolirinepoolstore/uploads /srv/lolirinepoolstore/backups
          sudo chown -R ubuntu:www-data /srv/lolirinepoolstore
          sudo find /srv/lolirinepoolstore/uploads -type d -exec chmod 755 {} \; || true
          sudo find /srv/lolirinepoolstore/uploads -type f -exec chmod 644 {} \; || true
          sudo tar -czf /srv/lolirinepoolstore/backups/uploads-$(date +%F-%H%M).tgz \
               -C /srv/lolirinepoolstore/uploads . || true
          sudo find /srv/lolirinepoolstore/backups -type f -mtime +7 -delete || true
          # --- FIN PERSISTENCE ---

          # Déploiement code
          APP_DIR=/var/www/ai-studio-app/lolirine-pool-store-8
          cd "$APP_DIR"
          git fetch origin
          git reset --hard origin/main

          # ⬇️ Ici on veut EXPANSION côté serveur → heredoc SANS quotes
          cat > .env <<EOT
          NODE_ENV=production
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOT

          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

          if pm2 describe lolirinepoolstore >/dev/null; then
            pm2 restart lolirinepoolstore
          else
            pm2 serve dist 3000 --spa --name lolirinepoolstore
          fi
          pm2 save
          EOF
