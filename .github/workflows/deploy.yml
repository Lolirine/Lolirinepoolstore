name: SSH Smoke Test
on: [workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets presence
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "SSH_HOST empty"; exit 1; else echo "SSH_HOST OK"; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "SSH_USER empty"; exit 1; else echo "SSH_USER OK"; fi
          if [ -z "${{ secrets.SSH_KEY }}" ]; then echo "SSH_KEY empty"; exit 1; else echo "SSH_KEY OK"; fi
      - name: Try SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            hostname
            uptime
