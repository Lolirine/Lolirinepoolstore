name: Deploy to OVH (PM2)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'db/migrations/**'
      - '.github/workflows/migrate.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          # ssh-passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}

      - name: Trust host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "export GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'; bash -s" <<'EOF'
          set -euo pipefail

          # --- PERSISTENCE UPLOADS ---
          sudo mkdir -p /srv/lolirinepoolstore/uploads /srv/lolirinepoolstore/backups
          sudo chown -R ubuntu:www-data /srv/lolirinepoolstore
          sudo find /srv/lolirinepoolstore/uploads -type d -exec chmod 755 {} \; || true
          sudo find /srv/lolirinepoolstore/uploads -type f -exec chmod 644 {} \; || true
          sudo tar -czf /srv/lolirinepoolstore/backups/uploads-$(date +%F-%H%M).tgz \
               -C /srv/lolirinepoolstore/uploads . || true
          sudo find /srv/lolirinepoolstore/backups -type f -mtime +7 -delete || true
          # --- FIN PERSISTENCE ---

          # Déploiement code (front PM2)
          APP_DIR=/var/www/ai-studio-app/lolirine-pool-store-8
          cd "$APP_DIR"
          git fetch origin
          git reset --hard origin/main

          cat > .env <<EOT
          NODE_ENV=production
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOT

          # --- INSTALL/BUILD ---
          # Détecte le gestionnaire et gère lockfile manquant/désync
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --no-immutable || yarn install
            yarn build
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --no-frozen-lockfile || pnpm install
            pnpm build
          elif [ -f package.json ]; then
            npm ci || npm install
            npm run build
          else
            echo "Aucun package.json: rien à builder"; 
          fi

          # Sélection de l'artefact (dist/out/build/.next/export)
          ART=""
          for d in dist out build ".next/export"; do
            [ -d "$d" ] && ART="$d" && break
          done
          [ -z "$ART" ] && ART="dist"
          # --- FIN INSTALL/BUILD ---

          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

          if pm2 describe lolirinepoolstore >/dev/null; then
            pm2 restart lolirinepoolstore
          else
            pm2 serve dist 3000 --spa --name lolirinepoolstore
          fi
          pm2 save
          EOF
