name: SSH Smoke Test (b64)
on: { workflow_dispatch: {} }

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          [ -n "${{ secrets.DEPLOY_KEY_B64 }}" ] || (echo "DEPLOY_KEY_B64 vide"; exit 1)
          [ -n "${{ secrets.DEPLOY_HOST }}" ]   || (echo "DEPLOY_HOST vide"; exit 1)
          [ -n "${{ secrets.DEPLOY_USER }}" ]   || (echo "DEPLOY_USER vide"; exit 1)

      - name: Recreate private key from b64
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.DEPLOY_KEY_B64 }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH
        run: ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
                 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "hostname && uptime"
