name: SSH Smoke Test
on: { workflow_dispatch: {} }

jobs:
  test:
    runs-on: ubuntu-latest
    # décommente si tes secrets sont dans un Environment nommé "production"
    # environment: production
    steps:
      - name: Check secrets presence
        run: |
          [ -n "${{ secrets.DEPLOY_HOST }}" ] && echo "DEPLOY_HOST=OK" || (echo "DEPLOY_HOST=EMPTY"; exit 1)
          [ -n "${{ secrets.DEPLOY_USER }}" ] && echo "DEPLOY_USER=OK" || (echo "DEPLOY_USER=EMPTY"; exit 1)
          if [ -n "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "DEPLOY_KEY_LEN=$(echo "${{ secrets.DEPLOY_KEY }}" | wc -c)"
          else
            echo "DEPLOY_KEY=EMPTY"; exit 1
          fi

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=yes \
             ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "hostname && uptime"
